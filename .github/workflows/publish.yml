name: Publish to PowerShell Gallery

# Publishes when you push a version tag (e.g. v0.3.0). The Gallery key lives in
# the repo secret PSGALLERY_KEY (Settings -> Secrets and variables -> Actions).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate module manifest
        shell: pwsh
        run: ./publish.ps1 -WhatIf

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          PSGALLERY_KEY: ${{ secrets.PSGALLERY_KEY }}
        run: ./publish.ps1 -NuGetApiKey $env:PSGALLERY_KEY
